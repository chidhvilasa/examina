# EXAMINA production Nginx configuration.
#
# Replace `your-domain.com` and the TLS certificate paths before use.
# The `limit_req_zone` directives belong in the `http {}` block of your
# main nginx.conf (they are declared once, globally) — shown here as a
# reference comment since this file is the `server {}` block(s) only.
#
#   limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
#   limit_req_zone $binary_remote_addr zone=report:10m rate=60r/m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name your-domain.com;

    # TLS — replace with real certificate paths
    ssl_certificate /etc/ssl/certs/examina.crt;
    ssl_certificate_key /etc/ssl/private/examina.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Body size limit — enforced before FastAPI. Matches EXAMINA's own
    # 20MB upload limit plus a small margin for multipart overhead.
    client_max_body_size 22m;
    client_body_timeout 60s;
    client_header_timeout 30s;

    # Security headers. EXAMINA's own SecurityHeadersMiddleware sets the
    # same X-* headers on API responses; they are repeated here so they
    # also cover the UI's static-file responses, which the middleware
    # never sees. Content-Security-Policy is set only here (not in the
    # API), since it differs between the API and the UI.
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
      always;
    server_tokens off;

    # API proxy
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    location /analyze {
        # Stricter rate limiting for the analysis endpoint. This is a
        # second, edge-layer limit in front of EXAMINA's own
        # slowapi-based per-process limit (10/minute) — defense in
        # depth, not a replacement for it.
        limit_req zone=api burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /report {
        limit_req zone=report burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
